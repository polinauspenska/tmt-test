    .btn_tmt {

        font-weight: 500;
    }

    .btn_tmt:hover {

    .navbar .navbar-nav .nav-link {

    #home {

    .btn-inner-glow {
        font-family: 'Poppins', sans-serif;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 200px;
        padding: 10px 28px;
        border-radius: 999px;
        font-size: 16px;
        color: #fff;
        background: #000;
        border: 1px solid rgba(14, 229, 248, 0.6);
        position: relative;
        cursor: pointer;

        /* INNER GLOW */
        box-shadow:
            inset 0 0 10px rgba(14, 229, 248, 0.6),
            inset 0 0 20px rgba(14, 229, 248, 0.3);

        backdrop-filter: blur(6px);
        transition: all 0.3s ease;
    }


    /* Soft inner highlight (top shine) */
    .btn-inner-glow::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: linear-gradient(180deg,
                rgba(14, 229, 248, 0.25) 0%,
                transparent 70%);
        opacity: 0.6;
        pointer-events: none;
    }

    /* Icon */
    .btn-inner-glow .icon {
        color: #0EE5F8;
    }

    /* Hover = stronger inner glow */
    .btn-inner-glow:hover {
        box-shadow:
            inset 0 2px 8px rgba(14, 229, 248, 0.7),
            inset 0 -2px 8px rgba(14, 229, 248, 0.4);
    }

    .hero-text p {
        margin: 0 auto;
        /* centers the block */
