<!DOCTYPE HTML>
<html lang="en-US">

<head>
	<meta charset="UTF-8">
	<title>Your Mail Has Been Send Successfully.</title>
	<link rel="icon" type="image/png" href="./assets/img/logo-icon.png">
	<!-- Latest Bootstrap min CSS -->
	<link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
	<style>
		html,
		body {
			font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
		}

		.welcome-area {
			background-image: url('/assets/img/bg/thank-you-bg.jpg');
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
			height: 100vh;
			/* ensure section has height */
			position: relative;
		}

		.welcome-area:before {
			/* background: #151c2b; */
			content: "";
			height: 100%;
			filter: alpha(opacity=80);
			position: absolute;
			width: 100%;
		}

		.hero-text {
			margin-top: 200px;
		}

		.hero-text h1 {
			color: #0EE5F8;
			font-size: 60px;
			font-weight: 500;
			line-height: 70px;
			margin-bottom: 20px;
			position: relative;
			text-transform: capitalize;
		}

		.hero-text h3 {
			margin-bottom: 60px;
			font-weight: 600;
			color: #fff;
			position: relative;
		}

		.back-home {
			background: none;
			border: 2px solid #0EE5F8;
			border-radius: 500px;
			color: #0EE5F8;
			font-weight: 600;
			position: relative;
			margin: 15px 15px 0;
			padding: 12px 36px;
			text-transform: capitalize;
			transition: all 0.2s ease 0s;
			text-decoration: navajowhite;
		}

		.back-home:hover,
		.back-home:focus {
			background: #0EE5F8;
			color: #fff;
			border: 2px solid #0EE5F8;
			text-decoration: none;
		}
	</style>
</head>

<body>
	<section class="welcome-area" style="background-image: url('./assets/img/thank-you-bg.jpg');">
		<div class="container">
			<div class="row">
				<div class="col-lg-8 offset-lg-2 col-sm-12 col-xs-12 text-center">
					<div class="hero-text">
						<h1>Thank you for your e-mail.</h1>
						<h3>We Will contact you very soon.</h3>
						<a class="back-home" href="index.html">Back To Home</a>
					</div>
				</div>
			</div>
		</div>
	</section>

	<!-- Latest jQuery -->
	<script src="assets/js/jquery-1.12.4.min.js"></script>
	<!-- Latest compiled and minified Bootstrap -->
	<script src="assets/bootstrap/js/bootstrap.min.js"></script>
</body>

</html>
